<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Mascota</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container container-wide">
    <h1 th:text="${mascota.id != null} ? 'Editar Mascota' : 'Registrar Mascota en Adopción'"></h1>

    <form th:action="@{/admin/mascotas/guardar}" th:object="${mascota}" method="post">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" th:field="*{nombre}">
            <small class="error-text" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></small>
        </div>

        <div class="form-group">
            <label for="especie">Especie</label>
            <input type="text" id="especie" th:field="*{especie}">
            <small class="error-text" th:if="${#fields.hasErrors('especie')}" th:errors="*{especie}"></small>
        </div>

        <div class="form-group">
            <label for="raza">Raza</label>
            <input type="text" id="raza" th:field="*{raza}">
            <small class="error-text" th:if="${#fields.hasErrors('raza')}" th:errors="*{raza}"></small>
        </div>

        <div class="form-group">
            <label for="edad">Edad</label>
            <input type="number" id="edad" th:field="*{edad}">
            <small class="error-text" th:if="${#fields.hasErrors('edad')}" th:errors="*{edad}"></small>
        </div>

        <div class="form-group">
            <label for="genero">Género</label>
            <input type="text" id="genero" th:field="*{genero}">
            <small class="error-text" th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}"></small>
        </div>

        <div class="form-group">
            <label for="ubicacion">Ubicación</label>
            <input type="text" id="ubicacion" th:field="*{ubicacion}">
            <small class="error-text" th:if="${#fields.hasErrors('ubicacion')}" th:errors="*{ubicacion}"></small>
        </div>

        <div class="form-group">
            <label for="estadoAdopcion">Estado de adopción</label>
            <input type="text" id="estadoAdopcion" th:field="*{estadoAdopcion}">
            <small class="error-text" th:if="${#fields.hasErrors('estadoAdopcion')}" th:errors="*{estadoAdopcion}"></small>
        </div>

        <div class="form-group">
            <label for="fotoUrl">URL de la foto</label>
            <input type="text" id="fotoUrl" th:field="*{fotoUrl}">
            <small class="error-text" th:if="${#fields.hasErrors('fotoUrl')}" th:errors="*{fotoUrl}"></small>
        </div>

        <div class="actions">
            <button class="btn" type="submit"
                    th:text="${mascota.id != null} ? 'Actualizar mascota' : 'Guardar mascota'"></button>
            <a class="btn secondary" th:href="@{/catalogo}">Ver catálogo</a>
            <a class="btn secondary" th:href="@{/dashboard}">Volver</a>
        </div>
    </form>
</div>
</body>
</html>
