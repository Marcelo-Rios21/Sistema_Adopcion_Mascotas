<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Mascotas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container container-wide">
    <h1>Catálogo de Mascotas en Adopción</h1>

    <form th:action="@{/catalogo/buscar}" method="get" class="form-group">
    <div class="form-group">
        <label for="especie">Especie</label>
        <input type="text" id="especie" name="especie">
    </div>

    <div class="form-group">
        <label for="ubicacion">Ubicación</label>
        <input type="text" id="ubicacion" name="ubicacion">
    </div>

    <div class="form-group">
        <label for="genero">Género</label>
        <input type="text" id="genero" name="genero">
    </div>

    <div class="form-group">
        <label for="edad">Edad</label>
        <input type="number" id="edad" name="edad">
    </div>

    <div class="actions">
        <button class="btn" type="submit">Buscar</button>
        <a class="btn secondary" th:href="@{/catalogo}">Limpiar filtros</a>
    </div>
</form>

    <div th:if="${#lists.isEmpty(mascotas)}" class="alert">
        No hay mascotas disponibles en este momento.
    </div>

    <table th:if="${not #lists.isEmpty(mascotas)}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Especie</th>
            <th>Raza</th>
            <th>Edad</th>
            <th>Género</th>
            <th>Ubicación</th>
            <th>Estado</th>
            <th>Foto</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="mascota : ${mascotas}">
            <td th:text="${mascota.id}"></td>
            <td th:text="${mascota.nombre}"></td>
            <td th:text="${mascota.especie}"></td>
            <td th:text="${mascota.raza}"></td>
            <td th:text="${mascota.edad}"></td>
            <td th:text="${mascota.genero}"></td>
            <td th:text="${mascota.ubicacion}"></td>
            <td th:text="${mascota.estadoAdopcion}"></td>
            <td>
                <img th:src="${mascota.fotoUrl}" alt="Foto mascota" width="100">
            </td>
        </tr>
        </tbody>
    </table>

    <div class="actions">
        <a class="btn" th:href="@{/login}">Iniciar sesión</a>
        <a class="btn secondary" th:href="@{/admin/mascotas/nueva}">Registrar mascota</a>
    </div>
</div>
</body>
</html>
