<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Programar Cita</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container container-wide">
    <h1>Programar Cita</h1>

    <form th:action="@{/citas/guardar}" th:object="${cita}" method="post">

        <div class="form-group">
            <label for="nombrePaciente">Paciente</label>
            <input type="text" id="nombrePaciente" th:field="*{nombrePaciente}">
            <small class="error-text" th:if="${#fields.hasErrors('nombrePaciente')}" th:errors="*{nombrePaciente}"></small>
        </div>

        <div class="form-group">
            <label for="fecha">Fecha</label>
            <input type="date" id="fecha" th:field="*{fecha}">
            <small class="error-text" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></small>
        </div>

        <div class="form-group">
            <label for="hora">Hora</label>
            <input type="time" id="hora" th:field="*{hora}">
            <small class="error-text" th:if="${#fields.hasErrors('hora')}" th:errors="*{hora}"></small>
        </div>

        <div class="form-group">
            <label for="motivo">Motivo</label>
            <input type="text" id="motivo" th:field="*{motivo}">
            <small class="error-text" th:if="${#fields.hasErrors('motivo')}" th:errors="*{motivo}"></small>
        </div>

        <div class="form-group">
            <label for="veterinarioAsignado">Veterinario asignado</label>
            <input type="text" id="veterinarioAsignado" th:field="*{veterinarioAsignado}">
            <small class="error-text" th:if="${#fields.hasErrors('veterinarioAsignado')}" th:errors="*{veterinarioAsignado}"></small>
        </div>

        <div class="actions">
            <button class="btn" type="submit">Guardar cita</button>
            <a class="btn secondary" th:href="@{/citas}">Ver lista</a>
            <a class="btn secondary" th:href="@{/dashboard}">Volver</a>
        </div>
    </form>
</div>
</body>
</html>
