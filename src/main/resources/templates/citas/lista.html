<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Citas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container container-wide">
    <h1>Lista de Citas</h1>

    <div th:if="${mensajeExito}" class="alert success" th:text="${mensajeExito}"></div>

    <div th:if="${#lists.isEmpty(citas)}" class="alert">
        No hay citas registradas todavía.
    </div>

    <table th:if="${not #lists.isEmpty(citas)}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Paciente</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Motivo</th>
            <th>Veterinario</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cita : ${citas}">
            <td th:text="${cita.id}"></td>
            <td th:text="${cita.nombrePaciente}"></td>
            <td th:text="${cita.fecha}"></td>
            <td th:text="${cita.hora}"></td>
            <td th:text="${cita.motivo}"></td>
            <td th:text="${cita.veterinarioAsignado}"></td>
        </tr>
        </tbody>
    </table>

    <div class="actions">
        <a class="btn" th:href="@{/citas/nueva}">Nueva cita</a>
        <a class="btn secondary" th:href="@{/dashboard}">Volver al panel</a>
    </div>
</div>
</body>
</html>
